<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APA App - Offline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="css/offline.css">
</head>
<body>
    <div class="offline-container">
        <header>APA App</header>
        <span class="material-icons-round icon">wifi_off</span>
        <h1>You're Offline</h1>
        <p>Check your internet connection and try again. Some features may still work with previously cached data.</p>
        <button onclick="window.location.reload()">Retry Connection</button>
        <div class="version">App Version: 2.4.2</div>
    </div>
</body>
</html>
